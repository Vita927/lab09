name: Docker

on: [push]

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build Docker image
      run: docker build -t logger .
    - name: Run container
      run: |
        mkdir -p logs
        echo -e "text1\ntext2\ntext3" | docker run -i -v $(pwd)/logs:/home/logs/ logger
    - name: Check result
      run: cat logs/log.txt
