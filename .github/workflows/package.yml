name: Package
on:
  push:
    tags:
      - 'v*'
jobs:
  package:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install CMake
      run: sudo apt update && sudo apt install cmake
    - name: Configure and build
      run: |
        cmake -H. -B_build
        cmake --build _build
    - name: Create package
      run: |
        cd _build
        cpack -G "TGZ"
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: packages
        path: _build/*.tar.gz
