name: CI
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install CMake
      run: sudo apt update && sudo apt install cmake
    - name: Configure and build with tests
      run: |
        cmake -H. -B_build -DBUILD_TESTS=ON
        cmake --build _build
    - name: Run tests
      run: |
        cd _build
        ctest --verbose
